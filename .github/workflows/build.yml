name: Build

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: >
          pyinstaller
          --onefile
          --name qbittorrent-manager
          --add-data "templates;templates"
          --hidden-import waitress
          app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/qbittorrent-manager.exe

  build-linux:
    name: Linux (binaire)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: >
          pyinstaller
          --onefile
          --name qbittorrent-manager-linux
          --add-data "templates:templates"
          --hidden-import waitress
          app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/qbittorrent-manager-linux

  build-macos-arm64:
    name: macOS ARM64 (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build ARM64
        run: >
          pyinstaller
          --onefile
          --name qbittorrent-manager-macos-arm64
          --add-data "templates:templates"
          --hidden-import waitress
          app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/qbittorrent-manager-macos-arm64

  build-macos-intel:
    name: macOS Intel (x86_64 via Rosetta 2)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python (universal2)
        run: |
          curl -Lo python-installer.pkg \
            https://www.python.org/ftp/python/3.12.7/python-3.12.7-macos11.pkg
          sudo installer -pkg python-installer.pkg -target /

      - name: Installer les dépendances (x86_64 via Rosetta 2)
        run: |
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12 \
            -m pip install -r requirements.txt pyinstaller

      - name: Build x86_64
        run: |
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.12/bin/python3.12 \
            -m PyInstaller --onefile --name qbittorrent-manager-macos-intel \
            --add-data "templates:templates" --hidden-import waitress app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: dist/qbittorrent-manager-macos-intel

  build-docker:
    name: Docker (ghcr.io)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Se connecter à ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build et push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Créer la release
    needs: [build-windows, build-linux, build-macos-arm64, build-macos-intel, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Télécharger les artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "{windows,linux,macos-arm64,macos-intel}"

      - name: Extraire le changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/qbittorrent-manager.exe
            linux/qbittorrent-manager-linux
            macos-arm64/qbittorrent-manager-macos-arm64
            macos-intel/qbittorrent-manager-macos-intel
          body: ${{ steps.changelog.outputs.notes }}
