{% extends "base.html" %}
{% block title %}Torrents – qBit Manager{% endblock %}

{% block extra_head %}
<style>
  .action-btn { padding: 2px 7px; font-size: .78rem; }
  .state-badge { font-size: .68rem; text-transform: uppercase; letter-spacing: .4px; padding: .2em .55em; }
  #loading-bar { height: 3px; background: linear-gradient(90deg,#1f6feb 40%,transparent 100%); animation: slide 1.2s infinite; }
  @keyframes slide { from{background-position:-200px} to{background-position:200px} }

  /* Split view */
  #table-col, #detail-col { transition: all .2s ease; }
  #torrents-table tbody tr { cursor: pointer; }
  #torrents-table tbody tr.selected-row td { background-color: rgba(88,166,255,.13) !important; }

  /* Detail panel */
  #detail-col .card { position: sticky; top: 72px; }
  .detail-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .5px; color: #8b949e; }
  .detail-value { font-size: .9rem; color: #c9d1d9; }
  .detail-hash  { font-size: .72rem; font-family: monospace; word-break: break-all; color: #8b949e; }
</style>
{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
  <h4 class="mb-0 fw-bold text-white">
    <i class="bi bi-list-ul me-2 text-primary"></i>Torrents
    <span id="torrent-count" class="badge bg-secondary ms-2 fw-normal" style="font-size:.75rem;"></span>
  </h4>
  <div class="d-flex align-items-center gap-2">
    <span id="cache-status" class="text-secondary small"></span>
    <select class="form-select form-select-sm bg-dark border-secondary text-white" id="filter-state" style="max-width:170px;">
      <option value="" data-i18n="torrents.all_states"></option>
    </select>
    <select class="form-select form-select-sm bg-dark border-secondary text-white" id="filter-category" style="max-width:170px;">
      <option value="" data-i18n="torrents.all_categories"></option>
    </select>
    <button class="btn btn-sm btn-outline-secondary" id="btn-refresh">
      <i class="bi bi-arrow-clockwise me-1"></i><span data-i18n="torrents.refresh"></span>
    </button>
  </div>
</div>

<!-- Loading bar -->
<div id="loading-bar" class="mb-2 rounded" style="display:none;"></div>

<!-- Bulk toolbar -->
<div class="card mb-3">
  <div class="card-body py-2 px-3 d-flex flex-wrap align-items-center gap-2">
    <span class="text-secondary me-2" style="font-size:.85rem;">
      <i class="bi bi-check2-square me-1"></i><span data-i18n="torrents.bulk_actions"></span>
    </span>
    <button class="btn btn-sm btn-outline-secondary" id="btn-select-all">
      <i class="bi bi-check-all me-1"></i><span data-i18n="torrents.select_all"></span>
    </button>
    <button class="btn btn-sm btn-outline-secondary" id="btn-deselect-all">
      <i class="bi bi-x-square me-1"></i><span data-i18n="torrents.deselect_all"></span>
    </button>
    <div class="vr mx-1"></div>
    <button class="btn btn-sm btn-outline-warning"  id="btn-pause-selected"><i class="bi bi-pause-fill me-1"></i><span data-i18n="torrents.pause"></span></button>
    <button class="btn btn-sm btn-outline-success"  id="btn-resume-selected"><i class="bi bi-play-fill me-1"></i><span data-i18n="torrents.resume"></span></button>
    <button class="btn btn-sm btn-outline-info"     id="btn-recheck-selected"><i class="bi bi-arrow-repeat me-1"></i><span data-i18n="torrents.recheck"></span></button>
    <button class="btn btn-sm btn-outline-danger"   id="btn-delete-selected"><i class="bi bi-trash me-1"></i><span data-i18n="torrents.delete"></span></button>
    <span id="selected-count" class="ms-2 text-secondary" style="font-size:.82rem;"></span>
  </div>
</div>

<!-- Split view row -->
<div class="row g-3" id="main-row">

  <!-- Table column -->
  <div class="col-12" id="table-col">
    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table id="torrents-table" class="table table-hover table-striped align-middle mb-0" style="width:100%">
            <thead class="table-dark">
              <tr>
                <th style="width:36px;"><input type="checkbox" class="form-check-input" id="chk-header" /></th>
                <th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th><th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail panel column (hidden by default) -->
  <div class="col-12 col-xl-5 d-none" id="detail-col">
    <div class="card">
      <div class="card-header border-secondary d-flex align-items-center justify-content-between">
        <span class="fw-semibold text-white" style="font-size:.9rem;">
          <i class="bi bi-info-circle me-2 text-primary"></i><span data-i18n="detail.title"></span>
        </span>
        <button class="btn btn-sm btn-outline-secondary" id="btn-close-detail">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div class="card-body" id="detail-body">
      </div>
    </div>
  </div>

</div><!-- /main-row -->

<!-- Delete modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title text-danger"><i class="bi bi-trash me-2"></i><span data-i18n="modal.delete_title"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-secondary" id="delete-modal-body"></div>
      <div class="modal-footer border-secondary">
        <div class="form-check me-auto">
          <input class="form-check-input" type="checkbox" id="chk-delete-files" />
          <label class="form-check-label text-secondary" for="chk-delete-files" data-i18n="modal.delete_files"></label>
        </div>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="modal.cancel"></button>
        <button type="button" class="btn btn-danger" id="btn-confirm-delete"><i class="bi bi-trash me-1"></i><span data-i18n="modal.confirm_delete"></span></button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
// ── Formatters ───────────────────────────────────────────────────────────────
function fmtSize(b) {
  if (!b) return '—';
  if (b >= 1e12) return (b/1e12).toFixed(2)+' TB';
  if (b >= 1e9)  return (b/1e9).toFixed(2)+' GB';
  if (b >= 1e6)  return (b/1e6).toFixed(1)+' MB';
  return (b/1e3).toFixed(0)+' KB';
}
function fmtSpeed(b) {
  if (!b) return '—';
  if (b >= 1e6) return (b/1e6).toFixed(1)+' MB/s';
  if (b >= 1e3) return (b/1e3).toFixed(0)+' KB/s';
  return b+' B/s';
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(ts) {
  if (!ts || ts <= 0) return '—';
  return new Date(ts * 1000).toLocaleString();
}

const STATE_MAP = {
  error:'bg-danger', missingFiles:'bg-danger',
  uploading:'bg-success', forcedUP:'bg-success',
  pausedUP:'bg-secondary', pausedDL:'bg-secondary',
  queuedUP:'bg-secondary', queuedDL:'bg-secondary',
  stalledUP:'bg-success', stalledDL:'bg-warning text-dark',
  checkingUP:'bg-info text-dark', checkingDL:'bg-info text-dark',
  checkingResumeData:'bg-info text-dark',
  allocating:'bg-info text-dark', moving:'bg-info text-dark',
  downloading:'bg-primary', forcedDL:'bg-primary', metaDL:'bg-info text-dark',
};

function stateLabel(state) {
  return __('state.' + state) || state || '?';
}

function renderRow(t) {
  const pct     = Math.round((t.progress||0)*100);
  const cls     = STATE_MAP[t.state] || 'bg-secondary';
  const label   = stateLabel(t.state);
  const pbCls   = pct>=100 ? 'bg-success' : pct>=50 ? 'bg-primary' : 'bg-warning';

  return [
    `<input type="checkbox" class="form-check-input row-chk" data-hash="${t.hash}">`,
    `<span title="${escHtml(t.name||'')}">${escHtml((t.name||'').slice(0,70))}${(t.name||'').length>70?'…':''}</span>`,
    t.category ? `<span class="badge bg-secondary">${escHtml(t.category)}</span>` : '<span class="text-secondary">—</span>',
    `<span data-order="${t.size||0}">${fmtSize(t.size)}</span>`,
    `<div class="d-flex align-items-center gap-1">
       <div class="progress flex-grow-1" style="min-width:70px;">
         <div class="progress-bar ${pbCls}" style="width:${pct}%"></div>
       </div>
       <small class="text-secondary" style="min-width:32px;text-align:right">${pct}%</small>
     </div>`,
    `<span class="badge state-badge ${cls}">${label}</span>`,
    t.num_seeds ?? '—',
    t.num_leechs ?? '—',
    `<span data-order="${t.dlspeed||0}">${fmtSpeed(t.dlspeed)}</span>`,
    `<span data-order="${t.upspeed||0}">${fmtSpeed(t.upspeed)}</span>`,
    `<span data-order="${t.ratio||0}">${t.ratio != null ? t.ratio.toFixed(3) : '—'}</span>`,
    `<div class="d-flex gap-1">
      <button class="btn btn-sm btn-outline-success action-btn" onclick="torrentAction('resume','${t.hash}')" title="${__('action.start_title')}"><i class="bi bi-play-fill"></i></button>
      <button class="btn btn-sm btn-outline-warning action-btn" onclick="torrentAction('pause','${t.hash}')"  title="${__('action.pause_title')}"><i class="bi bi-pause-fill"></i></button>
      <button class="btn btn-sm btn-outline-info    action-btn" onclick="torrentAction('recheck','${t.hash}')" title="${__('action.recheck_title')}"><i class="bi bi-arrow-repeat"></i></button>
      <button class="btn btn-sm btn-outline-danger  action-btn" onclick="openDeleteModal(['${t.hash}'])"       title="${__('action.delete_title')}"><i class="bi bi-trash"></i></button>
     </div>`,
  ];
}

// ── Torrent data cache (raw) ─────────────────────────────────────────────────
const torrentDataMap = {};
let currentDetailHash = null;

// ── DataTable (server-side) ──────────────────────────────────────────────────
let dt;
let pollTimer = null;

function initTable() {
  dt = $('#torrents-table').DataTable({
    serverSide: true,
    processing: true,
    ajax: function(dtParams, callback) {
      const params = new URLSearchParams({
        draw:               dtParams.draw,
        start:              dtParams.start,
        length:             dtParams.length,
        'search[value]':    dtParams.search.value,
        'order[0][column]': dtParams.order[0].column,
        'order[0][dir]':    dtParams.order[0].dir,
        category:           document.getElementById('filter-category').value,
        state:              document.getElementById('filter-state').value,
      });
      fetch('/api/torrents?' + params)
        .then(r => r.json())
        .then(json => {
          document.getElementById('torrent-count').textContent = json.recordsTotal || 0;
          if (json.loading) {
            schedulePoll();
            callback({ draw: json.draw, recordsTotal: 0, recordsFiltered: 0, data: [] });
            return;
          }
          document.getElementById('loading-bar').style.display = 'none';
          document.getElementById('cache-status').textContent = '';

          // Peupler les filtres au premier chargement seulement
          if (!filtersLoaded) {
            filtersLoaded = true;
            loadCategories();
            loadStates();
          }

          // Stocker les données brutes pour le panneau détail
          (json.data || []).forEach(t => torrentDataMap[t.hash] = t);

          // Mettre à jour le panneau si le torrent affiché est dans ce batch
          if (currentDetailHash && torrentDataMap[currentDetailHash]) {
            renderDetailPanel(torrentDataMap[currentDetailHash]);
          }

          callback({
            draw: json.draw,
            recordsTotal: json.recordsTotal,
            recordsFiltered: json.recordsFiltered,
            data: (json.data || []).map(renderRow),
          });
        })
        .catch(err => {
          showToast(__('toast.failed_load') + err.message, 'danger');
          callback({ draw: dtParams.draw, recordsTotal: 0, recordsFiltered: 0, data: [] });
        });
    },
    columns: [
      { orderable: false, searchable: false, width: '36px' },
      { title: __('col.name') },
      { title: __('col.category') },
      { title: __('col.size'),     type: 'num' },
      { title: __('col.progress'), orderable: false, searchable: false },
      { title: __('col.state') },
      { title: __('col.seeds'),    type: 'num' },
      { title: __('col.peers'),    type: 'num' },
      { title: __('col.down'),     type: 'num' },
      { title: __('col.up'),       type: 'num' },
      { title: __('col.ratio'),    type: 'num' },
      { title: __('col.actions'),  orderable: false, searchable: false },
    ],
    order: [[1, 'asc']],
    pageLength: 20,
    lengthMenu: [20, 50, 100, 200],
    language: {
      search: '<i class="bi bi-search me-1"></i>',
      searchPlaceholder: __('dt.search_placeholder'),
      processing: `<div class="spinner-border spinner-border-sm text-primary me-2"></div> ${__('dt.processing')}`,
      emptyTable: `<span class="text-secondary">${__('dt.empty')}</span>`,
      zeroRecords: `<span class="text-secondary">${__('dt.no_match')}</span>`,
      lengthMenu: __('dt.per_page'),
      info: __('dt.info'),
    },
  });

  // Réappliquer la surbrillance après chaque redraw
  dt.on('draw.dt', () => {
    if (currentDetailHash) {
      const chk = document.querySelector(`.row-chk[data-hash="${currentDetailHash}"]`);
      if (chk) chk.closest('tr').classList.add('selected-row');
    }
  });
}

function schedulePoll() {
  if (pollTimer) return;
  document.getElementById('loading-bar').style.display = 'block';
  document.getElementById('cache-status').textContent = __('toast.loading_server');
  pollTimer = setTimeout(() => {
    pollTimer = null;
    fetch('/api/torrents/status').then(r => r.json()).then(s => {
      if (s.ready) {
        dt.ajax.reload(null, false);
      } else {
        document.getElementById('cache-status').textContent =
          s.total > 0
            ? `${s.total} ${__('toast.loaded_torrents')}`
            : __('toast.connecting');
        schedulePoll();
      }
    });
  }, 1500);
}

// ── Detail panel ─────────────────────────────────────────────────────────────
function renderDetailPanel(t, props) {
  const pct   = Math.round((t.progress || 0) * 100);
  const cls   = STATE_MAP[t.state] || 'bg-secondary';
  const label = stateLabel(t.state);
  const pbCls = pct >= 100 ? 'bg-success' : pct >= 50 ? 'bg-primary' : 'bg-warning';

  const createdBy   = props ? (props.created_by  || '—') : '…';
  const createdOn   = props ? fmtDate(props.creation_date) : '…';
  const comment     = props ? (props.comment || '—') : '…';

  document.getElementById('detail-body').innerHTML = `
    <!-- Nom -->
    <p class="fw-semibold text-white mb-3" style="font-size:.9rem;word-break:break-word;">${escHtml(t.name || '—')}</p>

    <!-- État + progression -->
    <div class="mb-3">
      <div class="d-flex align-items-center justify-content-between mb-1">
        <span class="badge state-badge ${cls}">${label}</span>
        <small class="text-secondary">${pct}%</small>
      </div>
      <div class="progress" style="height:6px;">
        <div class="progress-bar ${pbCls}" style="width:${pct}%"></div>
      </div>
    </div>

    <!-- Catégorie -->
    ${t.category ? `
    <div class="mb-3">
      <span class="badge bg-secondary">${escHtml(t.category)}</span>
    </div>` : ''}

    <!-- Stats -->
    <div class="row g-2 mb-3">
      <div class="col-6">
        <div class="detail-label">${__('detail.size')}</div>
        <div class="detail-value">${fmtSize(t.size)}</div>
      </div>
      <div class="col-6">
        <div class="detail-label">Seeds</div>
        <div class="detail-value">${t.num_seeds ?? '—'}</div>
      </div>
      <div class="col-6">
        <div class="detail-label">Peers</div>
        <div class="detail-value">${t.num_leechs ?? '—'}</div>
      </div>
      <div class="col-6">
        <div class="detail-label">${__('detail.download')}</div>
        <div class="detail-value">${fmtSpeed(t.dlspeed)}</div>
      </div>
      <div class="col-6">
        <div class="detail-label">${__('detail.upload')}</div>
        <div class="detail-value">${fmtSpeed(t.upspeed)}</div>
      </div>
      <div class="col-6">
        <div class="detail-label">${__('detail.ratio')}</div>
        <div class="detail-value">${t.ratio != null ? t.ratio.toFixed(3) : '—'}</div>
      </div>
      <div class="col-6">
        <div class="detail-label">${__('detail.added_on')}</div>
        <div class="detail-value">${fmtDate(t.added_on)}</div>
      </div>
      <div class="col-6">
        <div class="detail-label">${__('detail.completed_on')}</div>
        <div class="detail-value">${fmtDate(t.completion_on)}</div>
      </div>
      <div class="col-6">
        <div class="detail-label">${__('detail.created_by')}</div>
        <div class="detail-value">${escHtml(createdBy)}</div>
      </div>
      <div class="col-6">
        <div class="detail-label">${__('detail.created_on')}</div>
        <div class="detail-value">${createdOn}</div>
      </div>
      <div class="col-12">
        <div class="detail-label">${__('detail.save_path')}</div>
        <div class="detail-value" style="word-break:break-all;font-size:.82rem;">${escHtml(t.save_path || '—')}</div>
      </div>
      <div class="col-12">
        <div class="detail-label">${__('detail.comment')}</div>
        <div class="detail-value" style="word-break:break-word;font-size:.82rem;">${escHtml(comment)}</div>
      </div>
    </div>

    <!-- Hash -->
    <div class="mb-3">
      <div class="detail-label mb-1">${__('detail.hash')}</div>
      <div class="detail-hash">${escHtml(t.hash || '—')}</div>
    </div>

    <!-- Actions -->
    <div class="d-flex gap-2 flex-wrap">
      <button class="btn btn-sm btn-outline-success" onclick="torrentAction('resume','${t.hash}')">
        <i class="bi bi-play-fill me-1"></i>${__('action.resume')}
      </button>
      <button class="btn btn-sm btn-outline-warning" onclick="torrentAction('pause','${t.hash}')">
        <i class="bi bi-pause-fill me-1"></i>${__('action.pause')}
      </button>
      <button class="btn btn-sm btn-outline-info" onclick="torrentAction('recheck','${t.hash}')">
        <i class="bi bi-arrow-repeat me-1"></i>${__('action.recheck')}
      </button>
      <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal(['${t.hash}'])">
        <i class="bi bi-trash me-1"></i>${__('action.delete')}
      </button>
    </div>
  `;
}

async function openDetailPanel(hash) {
  const t = torrentDataMap[hash];
  if (!t) return;

  currentDetailHash = hash;

  // Affichage immédiat avec les données disponibles (props en cours de chargement)
  renderDetailPanel(t, null);

  // Surbrillance de la ligne
  document.querySelectorAll('#torrents-table tbody tr').forEach(r => r.classList.remove('selected-row'));
  const chk = document.querySelector(`.row-chk[data-hash="${hash}"]`);
  if (chk) chk.closest('tr').classList.add('selected-row');

  // Réduire le tableau, afficher le panneau
  document.getElementById('table-col').className = 'col-12 col-xl-7';
  document.getElementById('detail-col').classList.remove('d-none');

  // Fetch des propriétés supplémentaires (created_by, creation_date)
  try {
    const resp = await fetch(`/api/torrent/properties?hash=${hash}`);
    const props = await resp.json();
    if (!props.error && currentDetailHash === hash) {
      renderDetailPanel(t, props);
    }
  } catch (_) {}
}

function closeDetailPanel() {
  currentDetailHash = null;
  document.getElementById('detail-col').classList.add('d-none');
  document.getElementById('table-col').className = 'col-12';
  document.querySelectorAll('#torrents-table tbody tr').forEach(r => r.classList.remove('selected-row'));
}

document.getElementById('btn-close-detail').addEventListener('click', closeDetailPanel);

// Clic sur une ligne du tableau
document.getElementById('torrents-table').addEventListener('click', e => {
  if (e.target.closest('input[type="checkbox"]') || e.target.closest('button')) return;
  const row = e.target.closest('tr');
  if (!row) return;
  const chk = row.querySelector('.row-chk');
  if (!chk) return;
  const hash = chk.dataset.hash;
  if (hash === currentDetailHash) {
    closeDetailPanel();  // deuxième clic sur la même ligne = fermer
  } else {
    openDetailPanel(hash);
  }
});

// ── Actions ──────────────────────────────────────────────────────────────────
async function torrentAction(action, hash, deleteFiles=false) {
  const body = {action, hashes:[hash]};
  if (action==='delete') body.deleteFiles = deleteFiles;
  const resp = await fetch('/api/torrent/action', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const data = await resp.json();
  if (data.ok) { showToast(__('toast.action_applied'), 'success'); setTimeout(()=>dt.ajax.reload(null,false), 500); }
  else showToast(data.error || __('toast.failed'), 'danger');
}

async function bulkAction(action) {
  const hashes = [...document.querySelectorAll('.row-chk:checked')].map(c=>c.dataset.hash);
  if (!hashes.length) { showToast(__('toast.no_selection'), 'warning'); return; }
  const resp = await fetch('/api/torrent/action', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action,hashes})});
  const data = await resp.json();
  if (data.ok) { showToast(`${data.count} ${__('toast.count_action')} ${__('toast.deleted')}`, 'success'); setTimeout(()=>dt.ajax.reload(null,false), 500); }
  else showToast(data.error || __('toast.failed'), 'danger');
}

// ── Selection ────────────────────────────────────────────────────────────────
function updateSelectedCount() {
  const n = document.querySelectorAll('.row-chk:checked').length;
  document.getElementById('selected-count').textContent = n ? `${n} ${__('trackers.selected_count')}` : '';
}

document.getElementById('chk-header').addEventListener('change', function() {
  document.querySelectorAll('.row-chk').forEach(c => c.checked = this.checked);
  updateSelectedCount();
});
document.getElementById('torrents-table').addEventListener('change', e => {
  if (e.target.classList.contains('row-chk')) updateSelectedCount();
});
document.getElementById('btn-select-all').addEventListener('click', () => {
  document.querySelectorAll('.row-chk').forEach(c => c.checked = true);
  document.getElementById('chk-header').checked = true;
  updateSelectedCount();
});
document.getElementById('btn-deselect-all').addEventListener('click', () => {
  document.querySelectorAll('.row-chk').forEach(c => c.checked = false);
  document.getElementById('chk-header').checked = false;
  updateSelectedCount();
});
document.getElementById('btn-pause-selected').addEventListener('click',   () => bulkAction('pause'));
document.getElementById('btn-resume-selected').addEventListener('click',  () => bulkAction('resume'));
document.getElementById('btn-recheck-selected').addEventListener('click', () => bulkAction('recheck'));
document.getElementById('btn-delete-selected').addEventListener('click',  () => {
  const hashes = [...document.querySelectorAll('.row-chk:checked')].map(c=>c.dataset.hash);
  if (!hashes.length) { showToast(__('toast.no_selection'), 'warning'); return; }
  openDeleteModal(hashes);
});
document.getElementById('btn-refresh').addEventListener('click', () => dt.ajax.reload(null, false));

// ── Delete modal ─────────────────────────────────────────────────────────────
let pendingDeleteHashes = [];
const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

function openDeleteModal(hashes) {
  pendingDeleteHashes = hashes;
  document.getElementById('delete-modal-body').textContent =
    hashes.length === 1 ? __('modal.delete_one') : __('modal.delete_many', {n: hashes.length});
  document.getElementById('chk-delete-files').checked = false;
  deleteModal.show();
}

document.getElementById('btn-confirm-delete').addEventListener('click', async () => {
  const deleteFiles = document.getElementById('chk-delete-files').checked;
  deleteModal.hide();
  const resp = await fetch('/api/torrent/action', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({action:'delete', hashes:pendingDeleteHashes, deleteFiles})});
  const data = await resp.json();
  if (data.ok) {
    if (pendingDeleteHashes.includes(currentDetailHash)) closeDetailPanel();
    showToast(`${data.count} ${__('toast.deleted')}`, 'success');
    setTimeout(()=>dt.ajax.reload(null,false), 500);
  } else showToast(data.error || __('toast.failed'), 'danger');
});

// ── Category / State filters ─────────────────────────────────────────────────
let filtersLoaded = false;

function loadCategories() {
  fetch('/api/torrents/categories')
    .then(r => r.json())
    .then(cats => {
      const sel = document.getElementById('filter-category');
      const current = sel.value;
      sel.innerHTML = `<option value="">${__('torrents.all_categories')}</option>`;
      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        if (c === current) opt.selected = true;
        sel.appendChild(opt);
      });
    });
}

function loadStates() {
  fetch('/api/torrents/states')
    .then(r => r.json())
    .then(states => {
      const sel = document.getElementById('filter-state');
      const current = sel.value;
      sel.innerHTML = `<option value="">${__('torrents.all_states')}</option>`;
      states.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = __('state.' + s) || s;
        if (s === current) opt.selected = true;
        sel.appendChild(opt);
      });
    });
}

document.getElementById('filter-category').addEventListener('change', () => {
  dt.ajax.reload(null, false);
});
document.getElementById('filter-state').addEventListener('change', () => {
  dt.ajax.reload(null, false);
});

// ── Init ─────────────────────────────────────────────────────────────────────
initTable();
</script>
