name: Build

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: >
          pyinstaller
          --onefile
          --name qbittorrent-manager
          --add-data "templates;templates"
          app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/qbittorrent-manager.exe

  build-linux:
    name: Linux (binaire)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: >
          pyinstaller
          --onefile
          --name qbittorrent-manager
          --add-data "templates:templates"
          app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/qbittorrent-manager

  build-macos:
    name: macOS (binaire)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: >
          pyinstaller
          --onefile
          --name qbittorrent-manager
          --add-data "templates:templates"
          app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/qbittorrent-manager

  release:
    name: Créer la release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Télécharger les artifacts
        uses: actions/download-artifact@v4

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/qbittorrent-manager.exe
            linux/qbittorrent-manager
            macos/qbittorrent-manager
          generate_release_notes: true
