{% extends "base.html" %}
{% block title %}Logs – qBit Manager{% endblock %}

{% block extra_head %}
<style>
  #log-container {
    font-family: 'Consolas', 'Menlo', 'Monaco', monospace;
    font-size: .8rem;
    background-color: var(--qbm-bg-card);
    border: 1px solid var(--qbm-border);
    border-radius: 6px;
    height: calc(100vh - 220px);
    overflow-y: auto;
    padding: .5rem;
  }
  .log-entry {
    display: flex;
    gap: .5rem;
    padding: 2px 4px;
    border-radius: 3px;
    line-height: 1.5;
  }
  .log-entry:hover { background-color: var(--qbm-hover-bg); }
  .log-time  { color: var(--qbm-text-muted); white-space: nowrap; flex-shrink: 0; }
  .log-badge { font-size: .65rem; padding: .15em .4em; white-space: nowrap; flex-shrink: 0; align-self: center; }
  .log-msg   { color: var(--qbm-text); word-break: break-word; flex: 1; }
  .log-normal   .log-badge { background-color: var(--qbm-bg-input); color: var(--qbm-text-muted); }
  .log-info     .log-badge { background-color: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; }
  .log-warning  .log-badge { background-color: #d2930022; color: #d29300; border: 1px solid #d2930044; }
  .log-critical .log-badge { background-color: #da363322; color: #f85149; border: 1px solid #da363344; }
  html[data-bs-theme=light] .log-info     .log-badge { background-color: #dbeafe; color: #1d4ed8; border-color: #93c5fd; }
  html[data-bs-theme=light] .log-warning  .log-badge { background-color: #fef9c3; color: #854d0e; border-color: #fde047; }
  html[data-bs-theme=light] .log-critical .log-badge { background-color: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  html[data-bs-theme=light] .log-normal   .log-badge { background-color: #f1f5f9; color: #64748b; border-color: #cbd5e1; }
  #status-dot { width:8px; height:8px; border-radius:50%; background:#3fb950; display:inline-block; margin-right:4px; }
  #status-dot.paused { background: var(--qbm-text-muted); }
</style>
{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
  <h4 class="mb-0 fw-bold">
    <i class="bi bi-terminal me-2 text-primary"></i><span data-i18n="logs.title"></span>
  </h4>
  <div class="d-flex align-items-center gap-2">
    <span class="text-secondary small">
      <span id="status-dot"></span>
      <span id="log-status"></span>
    </span>
    <!-- Filtres -->
    <div class="btn-group btn-group-sm" role="group">
      <button class="btn btn-outline-secondary active" data-filter="0"  id="f-all"     data-i18n="logs.filter_all"></button>
      <button class="btn btn-outline-secondary"        data-filter="1"  id="f-normal"  data-i18n="logs.filter_normal"></button>
      <button class="btn btn-outline-secondary"        data-filter="2"  id="f-info"    data-i18n="logs.filter_info"></button>
      <button class="btn btn-outline-secondary"        data-filter="4"  id="f-warning" data-i18n="logs.filter_warning"></button>
      <button class="btn btn-outline-secondary"        data-filter="8"  id="f-critical"data-i18n="logs.filter_critical"></button>
    </div>
    <div class="vr"></div>
    <button class="btn btn-sm btn-outline-secondary" id="btn-scroll-bottom" title="Scroll to bottom">
      <i class="bi bi-arrow-down-circle"></i>
    </button>
    <button class="btn btn-sm btn-outline-secondary" id="btn-pause">
      <i class="bi bi-pause-fill me-1"></i><span data-i18n="logs.pause"></span>
    </button>
    <button class="btn btn-sm btn-outline-secondary" id="btn-clear">
      <i class="bi bi-trash me-1"></i><span data-i18n="logs.clear"></span>
    </button>
  </div>
</div>

<div id="log-container">
  <div id="log-entries"></div>
  <div id="log-empty" class="text-secondary text-center py-4" style="display:none;" data-i18n="logs.empty"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const TYPE_CLASS = { 1: 'log-normal', 2: 'log-info', 4: 'log-warning', 8: 'log-critical' };

let lastId      = -1;
let paused      = false;
let activeFilter = 0;   // 0 = all
let pollTimer   = null;
let autoScroll  = true;

const container = document.getElementById('log-container');
const entries   = document.getElementById('log-entries');
const logEmpty  = document.getElementById('log-empty');
const statusDot = document.getElementById('status-dot');
const logStatus = document.getElementById('log-status');

function typeLabel(t) {
  const map = { 1: 'logs.type_normal', 2: 'logs.type_info', 4: 'logs.type_warning', 8: 'logs.type_critical' };
  return __(map[t] || 'logs.type_normal');
}

function fmtLogTime(ms) {
  const d = new Date(ms);
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function appendLog(entry) {
  const cls = TYPE_CLASS[entry.type] || 'log-normal';
  const row = document.createElement('div');
  row.className = `log-entry ${cls}`;
  row.dataset.type = entry.type;
  if (activeFilter !== 0 && entry.type !== activeFilter) {
    row.style.display = 'none';
  }
  row.innerHTML =
    `<span class="log-time">${fmtLogTime(entry.timestamp)}</span>` +
    `<span class="badge log-badge">${typeLabel(entry.type)}</span>` +
    `<span class="log-msg">${escHtml(entry.message)}</span>`;
  entries.appendChild(row);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateEmpty() {
  const visible = entries.querySelectorAll('.log-entry:not([style*="none"])').length;
  logEmpty.style.display = visible === 0 ? '' : 'none';
}

async function fetchLogs() {
  if (paused) return;
  try {
    const r = await fetch(`/api/qb/logs?last_id=${lastId}`);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    if (data.length) {
      data.forEach(e => {
        appendLog(e);
        if (e.id > lastId) lastId = e.id;
      });
      updateEmpty();
      if (autoScroll) container.scrollTop = container.scrollHeight;
    }
    statusDot.classList.remove('paused');
    logStatus.textContent = lastId >= 0 ? `ID ${lastId}` : '';
  } catch (e) {
    logStatus.textContent = '⚠ ' + e.message;
  }
  pollTimer = setTimeout(fetchLogs, 5000);
}

// Auto-scroll detection
container.addEventListener('scroll', () => {
  const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 40;
  autoScroll = atBottom;
});

// Scroll to bottom button
document.getElementById('btn-scroll-bottom').addEventListener('click', () => {
  container.scrollTop = container.scrollHeight;
  autoScroll = true;
});

// Pause / resume
const btnPause = document.getElementById('btn-pause');
btnPause.addEventListener('click', () => {
  paused = !paused;
  statusDot.classList.toggle('paused', paused);
  btnPause.querySelector('[data-i18n]').dataset.i18n = paused ? 'logs.resume' : 'logs.pause';
  btnPause.querySelector('i').className = paused ? 'bi bi-play-fill me-1' : 'bi bi-pause-fill me-1';
  applyTranslations();
  if (!paused) {
    clearTimeout(pollTimer);
    fetchLogs();
  }
});

// Clear
document.getElementById('btn-clear').addEventListener('click', () => {
  entries.innerHTML = '';
  lastId = -1;
  updateEmpty();
});

// Filter buttons
document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = parseInt(btn.dataset.filter);
    entries.querySelectorAll('.log-entry').forEach(row => {
      const t = parseInt(row.dataset.type);
      row.style.display = (activeFilter === 0 || t === activeFilter) ? '' : 'none';
    });
    updateEmpty();
    if (autoScroll) container.scrollTop = container.scrollHeight;
  });
});

// Start polling
logStatus.textContent = __('logs.connecting');
fetchLogs();
</script>
{% endblock %}
