{% extends "base.html" %}
{% block title %}Login – qBit Manager{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
  <div class="col-12 col-sm-9 col-md-7 col-lg-5 col-xl-4">

    <!-- Logo / hero -->
    <div class="text-center mb-4">
      <div class="mb-3">
        <span style="font-size:3.5rem; color:#58a6ff;">
          <i class="bi bi-cloud-download-fill"></i>
        </span>
      </div>
      <h2 class="fw-bold text-white">qBit Manager</h2>
      <p class="text-secondary mb-0" data-i18n="login.subtitle"></p>
    </div>

    <!-- Card -->
    <div class="card shadow-lg">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('login') }}" novalidate>

          <!-- Server URL -->
          <div class="mb-3">
            <label for="qb_url" class="form-label text-secondary fw-semibold">
              <i class="bi bi-hdd-network me-1"></i><span data-i18n="login.server_url"></span>
            </label>
            <input type="url"
                   class="form-control bg-dark border-secondary text-white"
                   id="qb_url" name="qb_url"
                   placeholder="http://localhost:8080"
                   value="{{ request.form.get('qb_url', '') }}"
                   required autofocus />
            <div class="form-text text-secondary">
              <span data-i18n="login.server_hint"></span> <code>http://192.168.1.10:8080</code>
            </div>
          </div>

          <!-- Username -->
          <div class="mb-3">
            <label for="username" class="form-label text-secondary fw-semibold">
              <i class="bi bi-person me-1"></i><span data-i18n="login.username"></span>
            </label>
            <input type="text"
                   class="form-control bg-dark border-secondary text-white"
                   id="username" name="username"
                   placeholder="admin"
                   value="{{ request.form.get('username', '') }}" />
          </div>

          <!-- Password -->
          <div class="mb-4">
            <label for="password" class="form-label text-secondary fw-semibold">
              <i class="bi bi-lock me-1"></i><span data-i18n="login.password"></span>
            </label>
            <div class="input-group">
              <input type="password"
                     class="form-control bg-dark border-secondary text-white"
                     id="password" name="password"
                     placeholder="••••••••" />
              <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                <i class="bi bi-eye" id="pwdIcon"></i>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg fw-semibold">
              <i class="bi bi-plug-fill me-2"></i><span data-i18n="login.connect"></span>
            </button>
          </div>

        </form>
      </div>
    </div>

    <p class="text-center text-secondary mt-4" style="font-size:.8rem;" data-i18n="login.disclaimer"></p>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('togglePwd').addEventListener('click', function () {
  const input = document.getElementById('password');
  const icon  = document.getElementById('pwdIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('bi-eye', 'bi-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('bi-eye-slash', 'bi-eye');
  }
});
</script>
{% endblock %}
